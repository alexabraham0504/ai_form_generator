<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Form Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="flex items-center -ml-4">
                    <button id="backToWelcomeBtn" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to Welcome
                    </button>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-magic text-3xl text-indigo-600 mr-3"></i>
                    <h1 class="text-3xl font-bold text-gray-900">Form Generator</h1>
                </div>
                <div class="flex items-center">
                    <div class="text-sm text-gray-500">
                        <i class="fas fa-robot mr-1"></i>
                        Powered by AI
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Form Builder Section -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <!-- Form Title Section -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Form Title</label>
                <div class="flex gap-2">
                    <input type="text" id="formTitle" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter your form title..." value="AI-Generated Form">
                    <button id="generateQuestionsBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center">
                        <i class="fas fa-robot mr-2"></i>
                        Generate Questions
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-1">Enter a title and click "Generate Questions" to create AI-powered questions</p>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-900">Build Your Form</h2>
                <div class="flex gap-2">
                    <button id="shuffleQuestionsBtn" class="bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-2 rounded-lg transition-colors flex items-center">
                        <i class="fas fa-random mr-1"></i>
                        Shuffle
                    </button>
                    <button id="addMoreQuestionsBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg transition-colors flex items-center">
                        <i class="fas fa-plus mr-1"></i>
                        Add More
                    </button>
                    <button id="addQuestionBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center transition-colors">
                        <i class="fas fa-plus mr-2"></i>
                        Add Question
                    </button>
                </div>
            </div>

            <!-- Questions Container -->
            <div id="questionsContainer" class="space-y-6">
                <!-- Questions will be dynamically added here -->
            </div>

            <!-- Action Buttons -->
            <div class="mt-8 pt-6 border-t border-gray-200 space-y-3">
                <button id="generateFormBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-lg text-lg font-semibold transition-colors flex items-center justify-center">
                    <i class="fas fa-magic mr-2"></i>
                    Generate Google Form
                </button>
                <!-- Export Form Data button disabled -->
                <!-- <button id="exportFormBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-lg font-medium transition-colors flex items-center justify-center">
                    <i class="fas fa-download mr-2"></i>
                    Export Form Data (JSON)
                </button> -->
            </div>
        </div>

        <!-- Generated Form Link -->
        <div id="formLinkSection" class="bg-white rounded-xl shadow-lg p-6 hidden">
            <h3 class="text-xl font-semibold text-gray-900 mb-4">Your Form is Ready!</h3>
            <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-600 text-xl mr-3"></i>
                    <div class="flex-1">
                        <p class="text-green-800 font-medium">Form created successfully!</p>
                        <a id="formLink" href="#" target="_blank" class="text-green-600 hover:text-green-700 underline break-all">
                            Click here to view your form
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Question Template (Hidden) -->
    <template id="questionTemplate">
        <div class="question-item bg-gray-50 rounded-lg p-6 border border-gray-200">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-lg font-medium text-gray-900">Question <span class="question-number"></span></h3>
                <button class="remove-question-btn text-red-500 hover:text-red-700 transition-colors">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
            
            <!-- Question Title -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Question Title</label>
                <input type="text" class="question-title w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter your question...">
            </div>

            <!-- Question Type -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Question Type</label>
                <select class="question-type w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="short_answer">Short Answer</option>
                    <option value="paragraph">Paragraph</option>
                    <option value="multiple_choice">Multiple Choice</option>
                    <option value="checkboxes">Checkboxes</option>
                    <option value="dropdown">Dropdown</option>
                </select>
            </div>

            <!-- Options Section (for multiple choice, checkboxes, dropdown) -->
            <div class="options-section hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Options</label>
                
                <!-- Options Input -->
                <div class="options-input mb-3">
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" rows="3" placeholder="Enter options (one per line) or upload CSV..."></textarea>
                </div>

                <!-- Options Actions -->
                <div class="flex flex-wrap gap-2 mb-3">
                    <button class="generate-ai-btn bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded text-sm transition-colors">
                        <i class="fas fa-robot mr-1"></i>
                        Generate with AI
                    </button>
                    <label class="upload-csv-btn bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm transition-colors cursor-pointer">
                        <i class="fas fa-upload mr-1"></i>
                        Upload CSV
                        <input type="file" accept=".csv" class="hidden csv-input">
                    </label>
                </div>

                <!-- Options Display -->
                <div class="options-display bg-white border border-gray-300 rounded-md p-3 min-h-[60px]">
                    <p class="text-gray-500 text-sm">Options will appear here...</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 flex items-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mr-3"></div>
            <span class="text-gray-700">Processing...</span>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
        // Check if user has seen welcome page
        window.addEventListener('load', function() {
            const hasSeenWelcome = localStorage.getItem('hasSeenWelcome');
            if (hasSeenWelcome !== 'true') {
                // Redirect to welcome page if not seen
                window.location.href = 'welcome.html';
            }
        });
    </script>
</body>
</html>
